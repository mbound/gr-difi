id: difi_synchronize
label: Synchronize
category: '[DIFI]'

templates:
  imports: import difi
  make: difi.synchronize(${type.size}*${vlen}, ${share_tags})

parameters:
- id: type
  label: IO Type
  dtype: enum
  options: [complex, float, int, short, byte]
  option_attributes:
      size: [gr.sizeof_gr_complex, gr.sizeof_float, gr.sizeof_int,
          gr.sizeof_short, gr.sizeof_char]
  hide: part
- id: share_tags
  label: Share tags
  dtype: bool
  default: False
- id: vlen
  label: Vector Length
  dtype: int
  default: '1'
  hide: ${ 'part' if vlen == 1 else 'none' }

inputs:
- label: in
  domain: stream
  dtype: ${ type }
  vlen: ${ vlen }
- label: synchro
  domain: stream
  dtype: ${ type }
  vlen: ${ vlen }

outputs:
- domain: stream
  dtype: ${ type }
  vlen: ${ vlen }

documentation: |-
    Synchronizes a signal processing stream to the rate of a DIFI source.

    Connect the data stream to the 'in' port and a DIFI Source output to the
    'synchro' port. GNURadio's scheduler will pace the data stream at the same
    rate as the DIFI source. Only the data from 'in' is passed to the output;
    the 'synchro' input is consumed and discarded.

    This block is used in paired mode flowgraphs where a DIFI Source and a
    DIFI Sink coexist. Without it, the two blocks run at independent rates and
    the sink can get ahead of the source, causing dropped packets or buffer
    overflow.

    ===Params===

    share_tags:
    Controls tag propagation. When True, tags from both inputs (including
    timing and context tags from the DIFI source on the synchro port) are
    propagated to the output using TPP_ALL_TO_ALL. When False (default), only
    tags from the data stream ('in') are propagated. Set to True if downstream
    blocks need the rx_time or DIFI context tags emitted by the DIFI Source.

    vlen:
    Vector length of the stream items. Defaults to 1 (scalar samples).

file_format: 1
